<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repetition aanmaken</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">

            <h1 class="mb-3">Lesplanning aanmaken</h1>
            <p class="text-muted mb-4">
                Vul hieronder de gegevens in om een nieuwe repetition aan te maken voor een specifieke groep.
            </p>

            <form id="repetitionForm" class="card p-4 shadow-sm">
                <!-- Titel -->
                <div class="mb-3">
                    <label for="title" class="form-label">Titel</label>
                    <input type="text" class="form-control" id="title" name="title" required>
                </div>

                <div class="mb-3">
                    <label for="date" class="form-label">Datum</label>
                    <input type="date" class="form-control" id="date" name="date" required>
                </div>


                <!-- Omschrijving -->
                <div class="mb-3">
                    <label for="description" class="form-label">Omschrijving</label>
                    <textarea class="form-control" id="description" name="description" rows="3"></textarea>
                </div>

                <!-- Groep select (dynamisch) -->
                <div class="mb-4">
                    <label for="group" class="form-label">Groep</label>
                    <select class="form-select" id="group" name="group" disabled>
                        <option value="">Groepen laden...</option>
                    </select>
                    <div class="form-text">
                        Op basis van deze groep worden de opties van de velden hieronder opgehaald.
                    </div>
                </div>

                <!-- 4 dynamische selectvelden -->
                <div class="row g-3">
                    <div class="col-md-6">
                        <label for="field1" class="form-label">Select veld 1</label>
                        <select class="form-select dynamic-select" id="field1" name="field1" disabled>
                            <option value="">Selecteer eerst een groep...</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label for="field2" class="form-label">Select veld 2</label>
                        <select class="form-select dynamic-select" id="field2" name="field2" disabled>
                            <option value="">Selecteer eerst een groep...</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label for="field3" class="form-label">Select veld 3</label>
                        <select class="form-select dynamic-select" id="field3" name="field3" disabled>
                            <option value="">Selecteer eerst een groep...</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label for="field4" class="form-label">Select veld 4</label>
                        <select class="form-select dynamic-select" id="field4" name="field4" disabled>
                            <option value="">Selecteer eerst een groep...</option>
                        </select>
                    </div>
                </div>

                <!-- Feedback -->
                <div id="formMessage" class="mt-3 d-none"></div>

                <!-- Submit -->
                <div class="mt-4 d-flex justify-content-end">
                    <button type="submit" class="btn btn-primary" id="submitBtn">
                        Opslaan
                    </button>
                </div>
            </form>

        </div>
    </div>
</div>

<script>
    // Jouw n8n endpoints
    const GROEPEN_URL = 'https://n8n.bergthaler.dev/webhook/6c769a07-3e37-4904-a77d-8e4e66fa3950'; // GET alle groepen
    const OPTIES_URL = 'https://n8n.bergthaler.dev/webhook/06931be9-b329-47fa-b842-bc66ff40f4eb'; // GET ?group=JR
    const POST_URL = 'https://jouw-n8n-domein/webhook/repetition'; // TODO: vul je POST webhook in

    const groupSelect = document.getElementById('group');
    const dynamicSelects = document.querySelectorAll('.dynamic-select');
    const form = document.getElementById('repetitionForm');
    const formMessage = document.getElementById('formMessage');
    const submitBtn = document.getElementById('submitBtn');

    // Helper om message te tonen
    function showMessage(type, text) {
        formMessage.className = '';
        formMessage.classList.add('mt-3', 'alert', `alert-${type}`);
        formMessage.textContent = text;
        formMessage.classList.remove('d-none');
    }

    function clearMessage() {
        formMessage.classList.add('d-none');
        formMessage.textContent = '';
    }

    // 1. Bij laden: groepen ophalen
    async function loadGroepen() {
        try {
            const resp = await fetch(GROEPEN_URL, { method: 'GET' });
            if (!resp.ok) throw new Error('Kon groepen niet laden');
            
            const data = await resp.json();
            
            groupSelect.disabled = false;
            groupSelect.innerHTML = '<option value="">Maak een keuze...</option>';
            
            data.forEach(item => {
                const opt = document.createElement('option');
                opt.value = item.id;        // value = id
                opt.textContent = item.name; // label = title
                groupSelect.appendChild(opt);
            });
            
        } catch (err) {
            showMessage('danger', 'Kon groepen niet laden van n8n.');
            groupSelect.innerHTML = '<option value="">Fout bij laden groepen</option>';
            console.error(err);
        }
    }

    // 2. Groep verandert → opties ophalen
    groupSelect.addEventListener('change', async function () {
        const group = this.value;
        clearMessage();

        if (!group) {
            dynamicSelects.forEach(sel => {
                sel.innerHTML = '<option value="">Selecteer eerst een groep...</option>';
                sel.disabled = true;
            });
            return;
        }

        // Disable tijdens laden
        dynamicSelects.forEach(sel => {
            sel.disabled = true;
            sel.innerHTML = '<option value="">Opties laden...</option>';
        });

        try {
            const resp = await fetch(`${OPTIES_URL}?group=${encodeURIComponent(group)}`, {
                method: 'GET'
            });

            if (!resp.ok) {
                throw new Error('Kon opties niet ophalen');
            }

            const data = await resp.json();

            dynamicSelects.forEach(sel => {
                sel.disabled = false;
                sel.innerHTML = '<option value="">Maak een keuze...</option>';

                data.forEach(item => {
                    const opt = document.createElement('option');
                    opt.value = item.id;
                    opt.textContent = item.title;
                    sel.appendChild(opt);
                });
            });

        } catch (err) {
            showMessage('danger', 'Er ging iets mis bij het ophalen van de opties.');
            dynamicSelects.forEach(sel => {
                sel.disabled = true;
                sel.innerHTML = '<option value="">Kon opties niet laden</option>';
            });
            console.error(err);
        }
    });

    // 3. Form submit via AJAX naar n8n
    form.addEventListener('submit', async function (e) {
        e.preventDefault();
        clearMessage();

        submitBtn.disabled = true;
        submitBtn.textContent = 'Bezig met opslaan...';

        const formData = new FormData(form);
        const body = {};
        formData.forEach((value, key) => {
            body[key] = value;
        });

        try {
            const resp = await fetch(POST_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(body)
            });

            if (!resp.ok) {
                throw new Error('n8n gaf een fout terug');
            }

            const result = await resp.json().catch(() => null);

            showMessage('success', 'Repetition succesvol opgeslagen.');
            form.reset();
            dynamicSelects.forEach(sel => {
                sel.innerHTML = '<option value="">Selecteer eerst een groep...</option>';
                sel.disabled = true;
            });
            groupSelect.innerHTML = '<option value="">Maak een keuze...</option>';

            console.log('n8n response:', result);

        } catch (err) {
            console.error(err);
            showMessage('danger', 'Er ging iets mis bij het opslaan van de repetition.');
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = 'Opslaan';
        }
    });

    // Start: laad groepen
    loadGroepen();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
